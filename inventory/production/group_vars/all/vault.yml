---
# Variables que referencian al archivo central de secrets
# El archivo secrets.yml contiene todas las contraseñas cifradas

# NOTA: Las variables del secrets.yml se cargan automáticamente
# cuando secrets.yml está en el directorio raíz del proyecto

# Mapeo de variables para compatibilidad con roles existentes
backup_user_password: "{{ vault_backup_user_password }}"
admin_password: "{{ vault_admin_password }}"
steam_user_password: "{{ vault_steam_user_password | default('') }}"

# Variables adicionales para Windows
windows_admin_password: "{{ vault_windows_admin_password }}"
windows_service_password: "{{ vault_windows_service_password | default('') }}"

# Gaming Center secrets
minecraft_rcon_password: "{{ vault_minecraft_rcon_password | default('') }}"
steam_api_key: "{{ vault_steam_api_key | default('') }}"

# Database y aplicaciones
database_password: "{{ vault_database_password | default('') }}"
web_app_password: "{{ vault_web_app_password | default('') }}"
api_key: "{{ vault_api_key | default('') }}"