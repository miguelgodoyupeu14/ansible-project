---
# Playbook de servicios unificado
# Funciona tanto para Linux como Windows

- name: "⚙️ CONFIGURACIÓN DE SERVICIOS"
  hosts: all
  become: yes
  gather_facts: yes
  
  pre_tasks:
    - name: "📋 Información de servicios por plataforma"
      ansible.builtin.debug:
        msg: |
          ============================================
          ⚙️  CONFIGURACIÓN DE SERVICIOS
          ============================================
          Plataforma: {{ ansible_facts['os_family'] }}
          Configurando servicios específicos para: {{ inventory_hostname }}
          ============================================
  
  roles:
    - role: services
      tags:
        - services
        - configuration