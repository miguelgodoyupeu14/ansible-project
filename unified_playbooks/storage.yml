---
# Playbook de almacenamiento unificado
# Funciona tanto para Linux como Windows

- name: "💾 CONFIGURACIÓN DE ALMACENAMIENTO"
  hosts: all
  become: yes
  gather_facts: yes
  
  pre_tasks:
    - name: "📋 Información de almacenamiento"
      ansible.builtin.debug:
        msg: |
          ============================================
          💾 CONFIGURACIÓN DE ALMACENAMIENTO
          ============================================
          Plataforma: {{ ansible_facts['os_family'] }}
          Configurando almacenamiento para: {{ inventory_hostname }}
          ============================================
  
  roles:
    - role: storage
      tags:
        - storage
        - filesystem