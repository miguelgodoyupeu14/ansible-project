---
# Playbook maestro - Configuración completa
# Ejecuta todos los roles en orden

- name: "🚀 CONFIGURACIÓN COMPLETA DEL SISTEMA"
  hosts: all
  become: yes
  gather_facts: yes
  
  pre_tasks:
    - name: "📋 Inicio de configuración completa"
      ansible.builtin.debug:
        msg: |
          ============================================
          🚀 CONFIGURACIÓN COMPLETA DEL SISTEMA
          ============================================
          Host: {{ inventory_hostname }}
          Plataforma: {{ ansible_facts['os_family'] }}
          Iniciando configuración completa...
          ============================================
  
  roles:
    - role: base
      tags: 
        - base
        - system
    
    - role: users
      tags:
        - users
        - security
    
    - role: services
      tags:
        - services
        - configuration
    
    - role: storage
      tags:
        - storage
        - filesystem
    
    - role: gaming
      tags:
        - gaming
        - steam
      when: gaming_enabled | default(false)
    
    - role: audit
      tags:
        - audit
        - monitoring
  
  post_tasks:
    - name: "✅ Configuración completa finalizada"
      ansible.builtin.debug:
        msg: |
          ✅ ¡Configuración completa exitosa!
          Host: {{ inventory_hostname }}
          Plataforma: {{ ansible_facts['os_family'] }}
          Todos los componentes configurados correctamente.