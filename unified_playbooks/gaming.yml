---
# Playbook de gaming unificado
# Configuración especial para Gaming Center

- name: "🎮 CONFIGURACIÓN GAMING CENTER"
  hosts: gaming_servers
  become: yes
  gather_facts: yes
  
  pre_tasks:
    - name: "📋 Información del Gaming Center"
      ansible.builtin.debug:
        msg: |
          ============================================
          🎮 GAMING CENTER SETUP
          ============================================
          Servidor: {{ gaming_server_name | default(inventory_hostname) }}
          Plataforma: {{ ansible_facts['os_family'] }}
          Email Admin: {{ gaming_admin_email | default('admin@gaming.local') }}
          Gaming habilitado: {{ gaming_enabled | default(false) }}
          ============================================
  
  roles:
    - role: base
      tags: 
        - base
        - gaming-deps
    - role: users
      tags:
        - users
        - gaming-users
    - role: storage
      tags:
        - storage
        - gaming-storage
    - role: gaming
      tags:
        - gaming
        - steam
        - game-servers
      when: gaming_enabled | default(false)
  
  post_tasks:
    - name: "🎮 Gaming Center configurado correctamente"
      ansible.builtin.debug:
        msg: |
          ✅ Gaming Center configurado exitosamente!
          Servidor: {{ inventory_hostname }}
          Plataforma: {{ ansible_facts['os_family'] }}
          Estado: Listo para juegos