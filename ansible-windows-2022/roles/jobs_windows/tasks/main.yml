---
# Tareas programadas

- name: Copiar scripts PowerShell a C:\Scripts
  ansible.windows.win_copy:
    src: "{{ item }}"
    dest: "{{ default_scripts_path }}\\{{ item }}"
  with_items:
    - backup.ps1
    - cleanup.ps1

- name: Crear tarea programada de backup diaria
  ansible.windows.win_scheduled_task:
    name: "BackupDiario"
    description: "Backup diario ejecutado por Ansible"
    actions:
      - path: "powershell.exe"
        arguments: "-File {{ default_scripts_path }}\\backup.ps1"
    triggers:
      - type: daily
        start_boundary: "2025-10-19T02:00:00"
    username: "SYSTEM"
    state: present
    enabled: yes
    retries: 3
    retry_interval: 5

- name: Crear tarea de limpieza de logs semanal
  ansible.windows.win_scheduled_task:
    name: "LimpiezaLogs"
    description: "Limpieza semanal de logs"
    actions:
      - path: "powershell.exe"
        arguments: "-File {{ default_scripts_path }}\\cleanup.ps1"
    triggers:
      - type: weekly
        days_of_week: Sunday
        start_boundary: "2025-10-19T03:00:00"
    username: "SYSTEM"
    state: present
    enabled: yes
    retries: 2
    retry_interval: 10
