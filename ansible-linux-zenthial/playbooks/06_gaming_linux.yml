---
- name: 🎮 Configuración Gaming Center - Zentyal con Steam
  hosts: linux_lab
  become: yes
  gather_facts: yes
  
  pre_tasks:
    - name: "📋 Gaming Center - Información inicial del sistema"
      ansible.builtin.debug:
        msg: |
          ============================================================
          🎮 INICIANDO CONFIGURACIÓN GAMING CENTER 🎮
          ============================================================
          Target: {{ inventory_hostname }} ({{ ansible_host }})
          Sistema: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Memoria: {{ ansible_memtotal_mb }}MB RAM
          Arquitectura: {{ ansible_architecture }}
          Usuario: {{ ansible_user }}
          Gaming habilitado: {{ gaming_enabled | default('false') }}
          ============================================================
    
    - name: "✅ Validar conectividad y permisos para gaming"
      ansible.builtin.assert:
        that:
          - ansible_user is defined
          - ansible_become is defined or ansible_user == "root"
          - gaming_enabled | default(false) | bool
        fail_msg: |
          ❌ Error de configuración gaming:
          - Usuario: {{ ansible_user | default('no definido') }}
          - Sudo disponible: {{ ansible_become | default('no definido') }}
          - Gaming habilitado: {{ gaming_enabled | default('false') }}
          - Verifica la configuración en group_vars/linux_lab.yml
        success_msg: |
          ✅ Configuración gaming verificada correctamente
          - Conectividad: OK
          - Permisos: OK  
          - Gaming habilitado: {{ gaming_enabled }}

    - name: "🚀 Verificar que la configuración base esté aplicada"
      ansible.builtin.stat:
        path: "{{ default_scripts_path }}"
      register: base_config_check
      
    - name: "⚠️ Advertencia si falta configuración base"
      ansible.builtin.debug:
        msg: |
          ⚠️  ADVERTENCIA: Configuración base no detectada
          
          Se recomienda ejecutar primero:
          1. ansible-playbook playbooks/00_base_linux.yml
          2. ansible-playbook playbooks/04_storage_linux.yml
          
          Continuando con la instalación gaming...
      when: not base_config_check.stat.exists

  roles:
    - gaming_server

  post_tasks:
    - name: "🎉 Gaming Center - Resumen final de instalación"
      ansible.builtin.debug:
        msg: |
          ============================================================
          🎉 ZENTYAL GAMING CENTER CONFIGURADO EXITOSAMENTE 🎉
          ============================================================
          
          🎮 GAMING SERVER LISTO PARA USAR!
          
          📍 INFORMACIÓN DEL SERVIDOR:
          - Nombre: {{ gaming_server_name | default('Zentyal Gaming Center') }}
          - IP: {{ ansible_host }}
          - Usuario Steam: steamuser
          - Directorio Steam: /data/steam
          - Directorio Juegos: /data/games
          
          🔧 SERVICIOS INSTALADOS:
          ✅ SteamCMD instalado y funcionando
          ✅ Usuario steamuser configurado  
          ✅ Firewall configurado para gaming
          ✅ Optimizaciones del sistema aplicadas
          ✅ Scripts de gestión creados
          
          🌐 ACCESO:
          - SSH: ssh {{ ansible_user }}@{{ ansible_host }}
          - Zentyal Web: https://{{ ansible_host }}:8443
          - Steam: sudo -u steamuser /data/steam/steamcmd/steamcmd.sh
          
          🎯 PRÓXIMOS PASOS:
          1. Conectar por SSH a tu Zentyal
          2. Ejecutar: /data/steam/scripts/steam-manager.sh start
          3. Instalar tus primeros game servers
          4. ¡Disfrutar gaming!
          
          📁 UBICACIONES IMPORTANTES:
          - Steam: /data/steam/
          - Juegos: /data/games/
          - Logs: /var/log/gaming/
          - Scripts: /data/steam/scripts/
          ============================================================

    - name: "🔍 Verificar que Steam funciona completamente"
      ansible.builtin.shell: |
        sudo -u steamuser /data/steam/steamcmd/steamcmd.sh +quit
      register: final_steam_test
      failed_when: final_steam_test.rc != 0

    - name: "📊 Mostrar información final del sistema"
      ansible.builtin.debug:
        msg: |
          📊 INFORMACIÓN FINAL DEL SISTEMA:
          - Memoria libre: {{ ansible_memfree_mb }}MB
          - Espacio /data: {% if ansible_mounts | selectattr('mount', 'equalto', '/data') | list | length > 0 %}{{ (ansible_mounts | selectattr('mount', 'equalto', '/data') | map(attribute='size_available') | first / 1024 / 1024 / 1024) | round(2) }}GB disponible{% else %}Usando sistema principal{% endif %}
          - CPU cores: {{ ansible_processor_vcpus }}
          - Estado UFW: Activo con reglas gaming

    - name: "✅ Assert - Verificación final completa del Gaming Center"
      ansible.builtin.assert:
        that:
          - final_steam_test.rc == 0
          - gaming_enabled | default(false) | bool
        fail_msg: |
          ❌ LA CONFIGURACIÓN DEL GAMING CENTER FALLÓ
          
          PROBLEMAS DETECTADOS:
          - SteamCMD test: {{ 'FAILED' if final_steam_test.rc != 0 else 'OK' }}
          - Gaming habilitado: {{ gaming_enabled | default('false') }}
          
          SOLUCIÓN:
          1. Revisa los logs de instalación
          2. Verifica que /data esté montado
          3. Ejecuta el playbook de nuevo
        success_msg: |
          🎉 ¡ÉXITO TOTAL! GAMING CENTER COMPLETAMENTE CONFIGURADO
          
          ✅ VERIFICACIONES EXITOSAS:
          - SteamCMD instalado y funcionando
          - Usuario steamuser configurado
          - Firewall gaming configurado  
          - Sistema optimizado para gaming
          - Scripts de gestión disponibles
          
          🎮 TU ZENTYAL ES OFICIALMENTE UN GAMING CENTER
          🚀 ¡Puedes empezar a instalar servidores de juegos!
          
          💡 COMANDO RÁPIDO PARA EMPEZAR:
          ssh {{ ansible_user }}@{{ ansible_host }}
          sudo /data/steam/scripts/steam-manager.sh start