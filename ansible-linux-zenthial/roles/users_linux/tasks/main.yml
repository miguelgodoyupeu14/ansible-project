---
# Tareas para usuarios y grupos

- name: Crear grupos de administración
  ansible.builtin.group:
    name: admin
    state: present

- name: Crear usuarios administradores
  ansible.builtin.user:
    name: "{{ item }}"
    groups: admin
    shell: /bin/bash
    state: present
  loop: "{{ admin_users }}"

- name: Añadir claves SSH autorizadas
  ansible.builtin.authorized_key:
    user: "{{ item }}"
    key: "{{ ssh_authorized_keys[0] }}"
    state: present
  loop: "{{ admin_users }}"

- name: Configurar sudoers para admin
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/admin"
    content: "admin ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: '0440'

- name: Establecer política de contraseña mínima
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_MIN_LEN'
    line: 'PASS_MIN_LEN 10'
    state: present
