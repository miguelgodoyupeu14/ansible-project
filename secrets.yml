---
# ARCHIVO CENTRALIZADO DE CONTRASEÑAS Y SECRETS
# Este archivo debe estar cifrado con: ansible-vault encrypt secrets.yml
# Para editar: ansible-vault edit secrets.yml
# Para ver: ansible-vault view secrets.yml

# ============================================================
# CONTRASEÑAS DE USUARIOS
# ============================================================

# Contraseña para usuario de backup (Linux y Windows)
vault_backup_user_password: "MySecureBackupPass2024!"

# Contraseña para usuario administrador principal
vault_admin_password: "AdminSecurePass2024!"

# Contraseña para usuario Steam (si se necesita)
vault_steam_user_password: "SteamSecurePass2024!"

# ============================================================
# CONTRASEÑAS DE SERVICIOS Y APLICACIONES
# ============================================================

# Contraseña para base de datos (si usas)
vault_database_password: "DbSecurePass2024!"

# Contraseña para aplicaciones web
vault_web_app_password: "WebAppSecurePass2024!"

# API Keys y tokens
vault_api_key: "your-secret-api-key-here"
vault_auth_token: "your-secret-token-here"

# ============================================================
# CONTRASEÑAS ESPECÍFICAS PARA WINDOWS
# ============================================================

# Contraseña para administrador local Windows
vault_windows_admin_password: "WinAdminSecure2024!"

# Contraseña para servicios Windows
vault_windows_service_password: "WinServiceSecure2024!"

# ============================================================
# LLAVES PRIVADAS Y CERTIFICADOS (si necesitas)
# ============================================================

# Llave privada SSH (solo si necesitas distribuirla)
vault_private_ssh_key: |
  -----BEGIN OPENSSH PRIVATE KEY-----
  # Tu llave privada aquí (solo si es absolutamente necesario)
  -----END OPENSSH PRIVATE KEY-----

# Certificados SSL
vault_ssl_certificate: |
  -----BEGIN CERTIFICATE-----
  # Tu certificado aquí
  -----END CERTIFICATE-----

vault_ssl_private_key: |
  -----BEGIN PRIVATE KEY-----
  # Tu llave privada del certificado aquí
  -----END PRIVATE KEY-----

# ============================================================
# GAMING CENTER SECRETS
# ============================================================

# Contraseñas para servidores de juegos
vault_minecraft_rcon_password: "MinecraftRcon2024!"
vault_steam_api_key: "your-steam-api-key-here"

# ============================================================
# CONFIGURACIÓN DE VAULT Y SEGURIDAD
# ============================================================

# Salt para hashing (genera uno único)
vault_security_salt: "your-unique-salt-string-here"

# Llaves de encriptación para aplicaciones
vault_encryption_key: "your-32-character-encryption-key"

# ============================================================
# CONFIGURACIÓN DE ANSIBLE VAULT
# ============================================================
# Para cifrar este archivo:
# ansible-vault encrypt secrets.yml
#
# Para usar en playbooks:
# ansible-playbook main.yml --ask-vault-pass
# 
# O crear archivo de password:
# echo "tu_password_vault" > .vault_password
# chmod 600 .vault_password
# ansible-playbook main.yml --vault-password-file .vault_password